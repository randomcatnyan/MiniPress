name: minipress

services:
  sql:
    image: mariadb:11.4
    container_name: minipress_db
    env_file:
      - .database.env
    volumes:
      - mdb:/var/lib/mysql
    networks:
      minipress.net:
        aliases:
          - sql.db

  adminer:
    image: adminer:5.4.2
    ports:
      - "8082:8080"
    depends_on:
      - sql
    networks:
      - minipress.net

  web:
    image: nginx:1.31.1
    ports:
      - "8080:80"
    volumes:
      - "./web/src:/usr/share/nginx/html:ro"
  
  coreadmin:
    build:
      context: core
      dockerfile: ./core.Dockerfile
    ports:
      - "8084:80"
    volumes:
      - "./core:/app"
    depends_on:
      - sql
    networks:
      - minipress.net
    working_dir: /app
    command: 'sh -c "composer install && php -S 0.0.0.0:80 -t /app/public/admin"'

  coreapi:
    build:
      context: core
      dockerfile: ./core.Dockerfile
    ports:
      - "8083:80"
    volumes:
      - "./core:/app"
    depends_on:
      - sql
    networks:
      - minipress.net
    working_dir: /app
    command: 'sh -c "composer install && php -S 0.0.0.0:80 -t /app/public/api /app/public/api/index.php"'


networks:
  minipress.net:
    driver: bridge

volumes:
  mdb: