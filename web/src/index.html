<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MiniPress.web</title>
    <link rel="icon" href="image/favicon.png" />
    <link rel="stylesheet" href="css/style.css" />
    <script defer src="js/index.js"></script>
</head>

<body>
    <h3>Liste des articles</h3>
    <section id="Article"></section>
    <script id="ArticleTemplate" type="text/x-handlebars-template">
    {{#each articles}}
        <article>
            <h3>{{titre}}</h3>
            <p>{{cree}} — par {{auteur}}</p>
        </article>
    {{/each}}
</script>

    <h3>cate</h3>
    <section id="categories"></section>
    <script id="cate" type="text/x-handlebars-template">
        {{#each categories}}
            <li class="categorie-item" data-id="{{id}}">
                <strong>{{titre}}</strong>
                {{#if description}}
                    <p >{{description}}</p>
                {{/if}}
            </li>
        {{/each}}
    </script>
</body>

</html>
